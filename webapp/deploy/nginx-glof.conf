# /etc/nginx/sites-available/glof.ginit.dev
# After first install run: certbot --nginx -d glof.ginit.dev  (adds the TLS block)

server {
    listen 80;
    server_name glof.ginit.dev;

    client_max_body_size 4m;

    # Static thumbnails served directly by nginx (fast)
    location /thumbs/ {
        alias /opt/glof-andes/thumbs/;
        expires 30d;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8077;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
